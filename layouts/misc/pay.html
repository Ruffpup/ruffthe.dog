<!doctype html>
{{- $langCode := site.LanguageCode | default "en-us" -}}
<html lang="{{ $langCode }}">
  <head>
    {{ partial "head" . }}
    <meta name="robots" content="noindex, nofollow, noarchive">
  </head>
  <body class="flex h-screen flex-col justify-between bg-neutral-100 dark:bg-neutral-800">
    <div>
      <header class="sticky top-0 z-10 bg-neutral-100 dark:bg-neutral-800">
        {{ partial "navbar" . }}
      </header>

      <main>
        <div class="mx-auto mt-12 flex max-w-(--breakpoint-lg) justify-center px-4">
          <article class="w-full">
            <header class="mb-8 text-center">
              <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-neutral-200 text-3xl dark:bg-neutral-700" aria-hidden="true">
                🐾
              </div>
              <h1 class="text-4xl font-extrabold text-slate-700 dark:text-slate-200">
                {{ .Title }}
              </h1>
              {{ with .Description }}
                <p class="mx-auto mt-3 max-w-2xl text-lg text-slate-500 dark:text-slate-400">
                  {{ . }}
                </p>
              {{ end }}
            </header>

            <div class="prose prose-slate mx-auto break-words text-lg text-slate-700 dark:prose-invert dark:text-slate-200">
              {{ .Content }}
            </div>
          </article>
        </div>
      </main>
    </div>

    <footer>
      {{ partial "footer" . }}
    </footer>
  </body>
</html>
